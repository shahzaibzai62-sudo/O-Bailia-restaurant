<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="description" content="O-Bailia Restaurant — House of Taste. Lava Burgers, Crown Crust Pizzas, Crispy Broast & more. Order online from Sanghar, Sindh." />
  <title>O-Bailia Restaurant — House of Taste</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css" />

  <style>
    /* ── LOADING SCREEN ── */
    #loading-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: #0A0A0A;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem;
      transition: opacity .6s ease, visibility .6s ease;
    }
    #loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    #loading-screen.gone   { display: none !important; }
    .loading-logo {
      width: 90px; height: 90px; border-radius: 50%;
      background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 2rem; font-weight: 900; color: #0A0A0A;
      box-shadow: 0 0 40px rgba(212,175,55,.5);
      animation: loadPulse 1.4s ease-in-out infinite;
    }
    .loading-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .loading-brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; color: #D4AF37; letter-spacing: .08em;
    }
    .loading-tagline {
      font-family: 'Josefin Sans', sans-serif;
      font-size: .75rem; letter-spacing: .25em; color: rgba(255,255,255,.4);
      text-transform: uppercase;
    }
    .loading-bar {
      width: 160px; height: 2px;
      background: rgba(255,255,255,.1); border-radius: 2px; overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%; width: 0; border-radius: 2px;
      background: linear-gradient(90deg, #D4AF37, #fff);
      animation: loadBar 1.8s ease forwards;
    }
    @keyframes loadPulse {
      0%,100%{box-shadow:0 0 40px rgba(212,175,55,.5);}
      50%{box-shadow:0 0 70px rgba(212,175,55,.9);}
    }
    @keyframes loadBar { to { width: 100%; } }

    /* ── RESTAURANT LOGO (generic img-based override) ── */
    .brand-logo-img {
      width: 40px; height: 40px; border-radius: 50%;
      object-fit: cover; display: block;
    }
    .brand-logomark { overflow: hidden; }

    /* ── HERO LOGO ── */
    .hero-logo-wrap {
      margin-bottom: 1.25rem;
      display: flex; justify-content: center;
    }
    .hero-logo-img {
      width: 80px; height: 80px; border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(212,175,55,.5);
      box-shadow: 0 0 30px rgba(212,175,55,.3);
    }
    .hero-logo-fallback {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg,#D4AF37,#B8860B);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display',serif;
      font-size: 1.8rem; font-weight: 900; color: #0A0A0A;
      border: 3px solid rgba(212,175,55,.5);
      box-shadow: 0 0 30px rgba(212,175,55,.3);
    }

    /* ── FOOTER LOGO ── */
    .footer-logo-img {
      width: 48px; height: 48px; border-radius: 50%;
      object-fit: cover; border: 2px solid rgba(212,175,55,.4);
    }
    .footer-logo-fallback { display:flex;align-items:center;justify-content:center; }

    /* ── HERO RESERVE BUTTON ── */
    .btn--reserve-hero {
      background: transparent;
      border: 2px solid #D4AF37;
      color: #D4AF37;
      padding: .75rem 1.75rem;
      border-radius: 3rem;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 700; font-size: .85rem;
      letter-spacing: .1em; text-transform: uppercase;
      cursor: pointer; transition: all .3s ease;
      display: inline-flex; align-items: center; gap: .5rem;
    }
    .btn--reserve-hero:hover {
      background: #D4AF37; color: #0A0A0A;
      box-shadow: 0 0 24px rgba(212,175,55,.5);
    }

    /* ── WHATSAPP FAB PULSE ── */
    .fab--whatsapp {
      position: relative;
    }
    .fab--whatsapp::before {
      content: '';
      position: absolute; inset: -6px; border-radius: 50%;
      background: rgba(37,211,102,.25);
      animation: waPulse 2s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes waPulse {
      0%,100%{transform:scale(1);opacity:.6;}
      50%{transform:scale(1.35);opacity:0;}
    }

    /* ── FOOD IMAGE CONTAINERS ── */
    .food-img-wrap {
      width: 100%; aspect-ratio: 16/9;
      border-radius: 12px; overflow: hidden;
      background: rgba(255,255,255,.04);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .food-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .4s ease;
    }
    .food-img-wrap:hover img { transform: scale(1.05); }
    .food-img-placeholder {
      font-size: 3.5rem; opacity: .35;
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── ADMIN LOGIN BUTTON IN NAVBAR ── */
    .admin-login-btn {
      background: none; border: 1px solid rgba(212,175,55,.3);
      color: rgba(212,175,55,.7);
      padding: .35rem .8rem; border-radius: .4rem;
      font-family: 'Josefin Sans',sans-serif;
      font-size: .7rem; letter-spacing: .08em; text-transform: uppercase;
      cursor: pointer; transition: all .3s ease;
      margin-right: .5rem;
    }
    .admin-login-btn:hover {
      border-color: #D4AF37; color: #D4AF37;
      background: rgba(212,175,55,.07);
    }

    /* ── ADMIN PANEL MODAL ── */
    .admin-overlay {
      position: fixed; inset: 0; z-index: 8000;
      background: rgba(0,0,0,.85); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .admin-overlay.open { display: flex; }
    .admin-panel {
      background: #111; border: 1px solid rgba(212,175,55,.2);
      border-radius: 1rem; width: 100%; max-width: 900px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 30px 80px rgba(0,0,0,.7);
      display: flex; flex-direction: column;
    }
    .admin-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .admin-panel-title {
      font-family: 'Playfair Display',serif;
      font-size: 1.3rem; color: #D4AF37;
      display: flex; align-items: center; gap: .6rem;
    }
    .admin-tabs {
      display: flex; gap: .25rem;
      padding: 1rem 1.5rem .25rem;
      border-bottom: 1px solid rgba(255,255,255,.06);
      flex-wrap: wrap;
    }
    .admin-tab {
      background: none; border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.5);
      padding: .4rem 1rem; border-radius: .4rem;
      font-family: 'Josefin Sans',sans-serif;
      font-size: .75rem; letter-spacing: .07em; text-transform: uppercase;
      cursor: pointer; transition: all .25s;
    }
    .admin-tab.active, .admin-tab:hover {
      background: rgba(212,175,55,.1); border-color: #D4AF37;
      color: #D4AF37;
    }
    .admin-panel-body { padding: 1.5rem; flex: 1; }
    .admin-section { display: none; }
    .admin-section.active { display: block; }
    .admin-section-title {
      font-family: 'Josefin Sans',sans-serif;
      font-size: .8rem; text-transform: uppercase;
      letter-spacing: .12em; color: rgba(255,255,255,.35);
      margin-bottom: 1rem;
    }
    .admin-stat-row {
      display: grid; grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
      gap: .75rem; margin-bottom: 1.5rem;
    }
    .admin-stat-card {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07);
      border-radius: .75rem; padding: 1rem;
      display: flex; flex-direction: column; gap: .3rem;
    }
    .admin-stat-num {
      font-family: 'Playfair Display',serif;
      font-size: 1.8rem; color: #D4AF37;
    }
    .admin-stat-label {
      font-family: 'Josefin Sans',sans-serif;
      font-size: .7rem; letter-spacing: .08em;
      text-transform: uppercase; color: rgba(255,255,255,.4);
    }
    .admin-table {
      width: 100%; border-collapse: collapse;
      font-family: 'Josefin Sans',sans-serif; font-size: .8rem;
    }
    .admin-table th {
      text-align: left; padding: .6rem .75rem;
      border-bottom: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.4); letter-spacing: .08em; text-transform: uppercase;
      font-weight: 600;
    }
    .admin-table td {
      padding: .75rem; border-bottom: 1px solid rgba(255,255,255,.05);
      color: rgba(255,255,255,.75);
    }
    .admin-badge {
      display: inline-block; padding: .2rem .6rem;
      border-radius: 2rem; font-size: .65rem;
      letter-spacing: .06em; text-transform: uppercase;
    }
    .admin-badge--green { background:rgba(74,222,128,.15); color:#4ade80; }
    .admin-badge--yellow { background:rgba(212,175,55,.15); color:#D4AF37; }
    .admin-badge--red { background:rgba(248,113,113,.15); color:#f87171; }

    /* Admin login form */
    .admin-login-form {
      max-width: 360px; margin: 2rem auto;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .admin-login-form .form-input {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      color: #fff; padding: .75rem 1rem; border-radius: .5rem;
      font-family: 'Josefin Sans',sans-serif; font-size: .9rem;
      width: 100%; outline: none; transition: border .2s;
    }
    .admin-login-form .form-input:focus { border-color: #D4AF37; }
    .admin-login-heading {
      text-align: center; font-family: 'Playfair Display',serif;
      font-size: 1.5rem; color: #D4AF37; margin-bottom: .5rem;
    }
    .admin-login-sub {
      text-align: center; font-family: 'Josefin Sans',sans-serif;
      font-size: .8rem; color: rgba(255,255,255,.35);
      letter-spacing: .06em; margin-bottom: 1rem;
    }

    /* ── RESPONSIVE FIXES ── */
    @media(max-width:600px){
      .admin-stat-row { grid-template-columns: repeat(2,1fr); }
      .admin-tabs { gap:.2rem; }
    }

    /* ── HERO BLACK SCREEN FIX ──
       Hero .reveal elements get .visible added by JS after loading screen hides.
       Add a CSS fallback: if .gone is on loading screen, force hero visible. */
    #loading-screen.gone ~ * .hero .reveal,
    #loading-screen.gone ~ * .hero-content > * {
      opacity: 1 !important;
      transform: none !important;
    }
    /* Pre-set hero reveals so transition plays properly when .visible is added */
    .hero .reveal {
      transition: opacity 0.7s ease 0.1s, transform 0.7s ease 0.1s;
    }
    .hero .reveal.visible {
      opacity: 1;
      transform: none;
    }
  </style>

  <!--
    BUG FIX: Firebase module script runs async. We use top-level await
    so __firestoreReady is set before 'firebase-ready' is dispatched.
    app.js uses `defer` so it runs after HTML parse — safe to read flags.
  -->
  <script type="module">
    try {
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
      const { getFirestore }  = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      window.__firebaseApp = initializeApp({
        apiKey:            "AIzaSyDEMO_REPLACE_WITH_REAL_KEY",
        authDomain:        "o-bailia.firebaseapp.com",
        projectId:         "o-bailia",
        storageBucket:     "o-bailia.appspot.com",
        messagingSenderId: "123456789",
        appId:             "1:123456789:web:abcdef123456"
      });
      window.__firestore      = getFirestore(window.__firebaseApp);
      window.__firestoreReady = true;
    } catch (err) {
      console.warn('[O-Bailia] Firebase init error:', err.message);
      window.__firestoreReady = false;
    } finally {
      // Always dispatch — app.js must never wait forever
      document.dispatchEvent(new Event('firebase-ready'));
    }
  </script>

  <!-- defer: runs after DOM parse, after firebase module has a chance to run -->
  <script src="app.js" defer></script>

  <script>
    // BUG FIX: The real cause of black hero screen:
    // 1. IntersectionObserver marks .reveal elements as 'visible' BEFORE loading screen hides
    // 2. CSS transition fires once and completes while loading screen is still covering everything
    // 3. When loading screen finally hides, transition is already done — elements appear at opacity:0
    //
    // SOLUTION: Remove 'visible' class from hero elements first, then re-add AFTER loading screen
    // hides so the CSS transition plays while the user can actually see it.

    function hideLoadingScreen() {
      var s = document.getElementById('loading-screen');
      if (!s || s.classList.contains('gone')) return;
      s.classList.add('hidden');
      // After fade transition (600ms), set display:none so it's completely gone
      // BUG FIX: Force hero .reveal elements visible AFTER loading screen hides
      // so the CSS transition plays while the user can see it (not while hidden)
      setTimeout(function() {
        s.classList.add('gone');
        document.querySelectorAll('.hero .reveal, .hero-content > *').forEach(function(el) {
          el.classList.add('visible');
        });
      }, 700);
    }
    setTimeout(hideLoadingScreen, 1900);
    setTimeout(hideLoadingScreen, 3500);
  </script>
